name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Sync Capacitor Android
        run: npx cap sync android

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build debug APK
        run: |
          cd android
          ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Rename APK
        run: cp android/app/build/outputs/apk/debug/app-debug.apk SV-Butler.apk

      - name: Upload APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: SV-Butler-Android
          path: SV-Butler.apk
          retention-days: 90

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: apk-v1.0.${{ github.run_number }}
          name: "SV Butler App v1.0.${{ github.run_number }}"
          body: |
            ## 📱 SV Butler Android App

            ### How to install:
            1. Download **SV-Butler.apk** below
            2. Send to butlers via WhatsApp
            3. Tap the file on their Android phone
            4. If blocked — Settings → Security → Allow unknown sources
            5. Tap Install → Done

            Built from commit: ${{ github.sha }}
          files: SV-Butler.apk
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
